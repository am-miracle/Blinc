[book]
authors = ["Blinc Contributors"]
language = "en"
src = "src"
title = "Blinc UI Framework"
description = "A GPU-accelerated, reactive UI framework for Rust. Fine-grained signals, declarative views, and a wgpu renderer that targets desktop, mobile, and the browser from one source tree."

[build]
# The docs book is published at https://blinc.rs/docs/ — the landing
# page at https://blinc.rs/ lives in `web/` at the repo root and is
# copied into `target/site/` alongside this output by the docs workflow.
build-dir = "../../target/site/docs"

[output.html]
# Used by mdBook for canonical links + sitemap.xml.
site-url = "/docs/"
git-repository-url = "https://github.com/project-blinc/Blinc"
edit-url-template = "https://github.com/project-blinc/Blinc/edit/main/docs/book/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
