name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/book/**'
      - '.github/workflows/docs.yml'
      - 'crates/blinc_app/examples/**'
      - 'crates/blinc_app/src/web.rs'
      - 'crates/blinc_layout/src/**'
      - 'tools/build-web-examples/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/book/**'
      - '.github/workflows/docs.yml'
      - 'crates/blinc_app/examples/**'
      - 'crates/blinc_app/src/web.rs'
      - 'crates/blinc_layout/src/**'
      - 'tools/build-web-examples/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The codegen tool + wasm-pack invocations need a working
      # Rust toolchain with the wasm32 target. Cached between runs
      # via `Swatinem/rust-cache` so the 41 wrapper compiles amortise
      # to ~5-10 minutes on a warm cache (cold is ~25-35 minutes).
      - name: Setup Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Include the auto-generated wrapper tree so incremental
          # builds amortise across runs. The wrappers themselves are
          # gitignored, so without this key they'd rebuild from
          # scratch every time.
          workspaces: |
            .
            examples/_generated
          # Keep caches separate from the main CI workflow — the
          # wasm32 target dir pulls in a different dep tree.
          prefix-key: "docs-v1"

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi

      # Regenerates `examples/_generated/<name>/` wrapper crates
      # from the cross-target source in `crates/blinc_app/examples/`,
      # rewrites the gallery markdown + SUMMARY patch in
      # `docs/book/src/web/`, and runs `wasm-pack build --target web
      # --release` in each wrapper. The built wrappers land in
      # `examples/_generated/<name>/pkg/` and stay there until the
      # staging step below copies them into the book output.
      #
      # `mdbook build` wipes and rewrites `target/book/`, so we
      # can't stage into `target/book/examples/` yet — staging
      # happens after mdBook runs.
      - name: Generate + build web example wrappers
        run: |
          cargo run -p blinc-build-web-examples -- --build

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build mdBook
        run: mdbook build docs/book

      # Now that mdBook has populated `target/book/`, copy each
      # wrapper's `index.html` + `pkg/` into
      # `target/book/examples/<name>/`. The path is chosen so that
      # mdBook's iframe references under
      # `docs/book/src/web/example-gallery/<name>.md`
      # (`src="../../examples/<name>/index.html"`) resolve correctly
      # against the published book root at serve time.
      #
      # `--no-build` would be nice here to explicitly skip the
      # wasm-pack re-run, but since the previous step already
      # produced every `pkg/` directory, `wasm-pack build` is a
      # no-op (cargo cache hit) and takes seconds.
      - name: Stage example artifacts into book output
        run: |
          cargo run -p blinc-build-web-examples -- \
            --no-gallery \
            --stage-to target/book/examples

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./target/book

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  wiki:
    name: Sync to GitHub Wiki
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Clone Wiki Repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki

      - name: Convert Book to Wiki
        run: python3 .github/scripts/book-to-wiki.py

      - name: Push to Wiki
        run: |
          cd wiki
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync documentation from main branch"
            git push
          fi
