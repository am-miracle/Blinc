name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Reduce disk usage on GitHub-hosted runners (debug info + incremental artifacts can be large).
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libvulkan-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libdbus-1-dev \
            libxdo-dev \
            libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo check
        run: cargo check --workspace --all-features

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        continue-on-error: true
        run: cargo audit

  security-deny:
    name: Security Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo deny
        continue-on-error: true
        run: cargo deny check advisories bans sources

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libfontconfig1-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libdbus-1-dev \
            libxdo-dev \
            libasound2-dev \
            fonts-dejavu-core \
            xvfb

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum cargo nextest run --workspace --all-features
        env:
          # Use software rendering for headless GPU tests
          MESA_GL_VERSION_OVERRIDE: "4.5"
          LIBGL_ALWAYS_SOFTWARE: "1"

      - name: Run tests (non-Linux)
        if: runner.os != 'Linux'
        run: cargo nextest run --workspace --all-features

      - name: Run doctests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum cargo test --doc --workspace --all-features
        env:
          # Use software rendering for headless GPU tests
          MESA_GL_VERSION_OVERRIDE: "4.5"
          LIBGL_ALWAYS_SOFTWARE: "1"

      - name: Run doctests (non-Linux)
        if: runner.os != 'Linux'
        run: cargo test --doc --workspace --all-features

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libvulkan-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libdbus-1-dev \
            libxdo-dev \
            libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run clippy
        run: cargo clippy --workspace --all-features -- -W clippy::all -A clippy::type_complexity -A dead_code

  wasm32-check:
    name: Wasm32 Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-wasm32-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm32-

      # Check the runner crate by itself with the `web` feature only.
      # Plain `cargo check --workspace` won't work for wasm32 because the
      # desktop platform crates (rfd, tray-icon, muda, notify-rust, …)
      # don't compile on wasm32 — they're target-gated under
      # `cfg(not(target_arch = "wasm32"))` but Cargo's feature unification
      # still tries to resolve them. So we drive the wasm32 build through
      # the `web` feature on `blinc_app` directly, the same way the
      # examples do.
      - name: Cargo check (blinc_app, wasm32, web feature)
        run: |
          cargo check \
            -p blinc_app \
            --target wasm32-unknown-unknown \
            --features web \
            --no-default-features

      - name: Cargo check (web examples, wasm32)
        run: |
          cargo check \
            -p blinc_web_hello \
            -p blinc_web_scroll \
            -p blinc_web_drag \
            -p blinc_web_assets \
            --target wasm32-unknown-unknown

      - name: Clippy (blinc_app, wasm32, web feature)
        run: |
          cargo clippy \
            -p blinc_app \
            --target wasm32-unknown-unknown \
            --features web \
            --no-default-features \
            -- -W clippy::all -A clippy::type_complexity -A dead_code

      - name: Clippy (web examples, wasm32)
        run: |
          cargo clippy \
            -p blinc_web_hello \
            -p blinc_web_scroll \
            -p blinc_web_drag \
            -p blinc_web_assets \
            --target wasm32-unknown-unknown \
            -- -W clippy::all -A clippy::type_complexity -A dead_code

  wasm32-pack-build:
    name: Wasm32 Pack Build
    runs-on: ubuntu-latest
    needs: wasm32-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-wasm-pack-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-pack-

      # Build every web example so any Cargo.toml /
      # wasm-pack metadata regression surfaces in CI. The
      # `--release` profile runs `wasm-opt -O --all-features` via
      # the `[package.metadata.wasm-pack.profile.release]` block in
      # each example's Cargo.toml.
      - name: wasm-pack build web_hello
        run: wasm-pack build examples/web_hello --target web --release

      - name: wasm-pack build web_scroll
        run: wasm-pack build examples/web_scroll --target web --release

      - name: wasm-pack build web_drag
        run: wasm-pack build examples/web_drag --target web --release

      - name: wasm-pack build web_assets
        run: wasm-pack build examples/web_assets --target web --release

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libvulkan-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libdbus-1-dev \
            libxdo-dev \
            libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      - name: Build documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libvulkan-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libdbus-1-dev \
            libxdo-dev \
            libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p blinc_cli

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: blinc-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/blinc

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: blinc-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/blinc.exe
