<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Not found — Blinc</title>
<link rel="icon" type="image/png" sizes="any" href="/favicon.png" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="200x200" href="/favicon.png" />
<script>
  // Old book paths used to live at /<topic>/...; the docs book now
  // lives at /docs/<topic>/.... Rewrite any path that looks like a
  // book topic so external links keep resolving.
  (function () {
    var path = location.pathname;
    if (path === '/' || path.indexOf('/docs/') === 0) return;
    var rest = path.replace(/^\/+/, ''); // strip leading slash
    if (!rest) return;
    var topics = [
      'introduction', 'getting-started', 'core', 'components', 'cn',
      'widgets', 'animation', 'canvas-kit', 'web', 'mobile',
      'architecture', 'advanced', 'contributing'
    ];
    var first = rest.split('/')[0].replace(/\.html$/, '');
    if (topics.indexOf(first) !== -1) {
      location.replace('/docs/' + rest + location.search + location.hash);
    }
  })();
</script>
<style>
  :root {
    --bg: #f6e9eb; --ink: #1a1320; --ink-soft: #5a4a5c; --purple: #7a2bff;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
  }
  .card { max-width: 480px; text-align: center; }
  .code {
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  h1 { font-size: clamp(48px, 8vw, 88px); margin: 8px 0 16px; letter-spacing: -0.03em; }
  p  { font-size: 17px; line-height: 1.5; color: var(--ink-soft); margin: 0 0 28px; }
  .row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 20px; border-radius: 999px;
    font-size: 15px; font-weight: 500; text-decoration: none;
    border: 1px solid transparent;
  }
  .btn-primary { background: var(--purple); color: white; }
  .btn-ghost   { background: transparent; color: var(--ink); border-color: rgba(26,19,32,0.22); }
</style>
</head>
<body>
  <main class="card">
    <div class="code">Error · 404</div>
    <h1>Lost in a blinc.</h1>
    <p>The page you're looking for doesn't exist here. The docs moved to <code>/docs/</code> — try one of the links below.</p>
    <div class="row">
      <a class="btn btn-primary" href="/">Back home</a>
      <a class="btn btn-ghost" href="/docs/">Open the docs</a>
    </div>
  </main>
</body>
</html>
